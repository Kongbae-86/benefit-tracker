<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Benefits">
<meta name="theme-color" content="#FAF7F2">
<title>Benefit Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --paper:#FAF7F2;--paper2:#F3EDE3;--paper3:#EBE3D5;
  --ink:#2C2416;--ink2:#5C4F3A;--ink3:#9C8E7A;
  --orange:#D97026;--orange-light:#F5A05A;--orange-bg:#FDF0E6;--orange-border:#F0C49A;
  --done-color:#2E7D52;--done-bg:#EAF5EE;
  --todo-color:#C25B00;--todo-bg:#FEF3E8;
  --waiting-color:#1D6FA4;--waiting-bg:#E8F4FD;
  --early-color:#8A7D6A;--early-bg:#F5F1EB;
  --border:#DDD5C6;--shadow:0 2px 12px rgba(44,36,22,0.08);
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--paper);}
body{font-family:'DM Sans',sans-serif;color:var(--ink);display:flex;flex-direction:column;}
header{padding:calc(14px + var(--safe-top)) 18px 12px;background:var(--paper);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Crimson Pro',serif;font-size:20px;font-weight:600;color:var(--orange);}
.logo span{color:var(--ink2);font-weight:400;font-style:italic;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .3s;}
.sync-dot.saving{background:var(--orange-light);}.sync-dot.saved{background:var(--done-color);}.sync-dot.error{background:#D94040;}
.sync-label{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;}
.summary-bar{display:flex;border-bottom:1px solid var(--border);background:var(--orange-bg);flex-shrink:0;}
.summary-item{flex:1;padding:10px 8px;text-align:center;border-right:1px solid var(--orange-border);}
.summary-item:last-child{border-right:none;}
.summary-val{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;}
.summary-label{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.v-done{color:var(--done-color);}.v-todo{color:var(--todo-color);}.v-waiting{color:var(--waiting-color);}.v-orange{color:var(--orange);}
.filter-bar{padding:8px 14px;display:flex;gap:6px;border-bottom:1px solid var(--border);background:var(--paper);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-section{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.filter-divider{width:1px;background:var(--border);height:18px;margin:0 3px;flex-shrink:0;}
.fbtn{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--ink3);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif;flex-shrink:0;}
.fbtn.active{color:var(--orange);border-color:var(--orange);background:var(--orange-bg);font-weight:500;}
.scroll-area{flex:1;overflow-y:auto;padding:12px 12px calc(72px + var(--safe-bottom));-webkit-overflow-scrolling:touch;background:var(--paper2);}
.card-group{background:var(--paper);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow);}
.card-header{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.card-header:active{background:var(--paper2);}
.card-name{font-family:'Crimson Pro',serif;font-size:17px;font-weight:600;color:var(--ink);}
.card-meta{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;margin-top:2px;}
.card-right{display:flex;align-items:center;gap:8px;}
.stat-pills{display:flex;gap:4px;}
.spill{font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:10px;font-weight:500;}
.pd{background:var(--done-bg);color:var(--done-color);}.pt{background:var(--todo-bg);color:var(--todo-color);}.pw{background:var(--waiting-bg);color:var(--waiting-color);}
.chevron{color:var(--ink3);font-size:11px;transition:transform .2s;flex-shrink:0;}
.chevron.open{transform:rotate(90deg);}
.card-body{display:none;border-top:1px solid var(--border);}
.card-body.open{display:block;}
.benefit-row{display:flex;align-items:center;padding:10px 16px;gap:8px;border-bottom:1px solid var(--paper3);}
.benefit-row:last-of-type{border-bottom:none;}
.benefit-row:active{background:var(--paper2);}
.b-main{flex:1;min-width:0;}
.b-desc{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.b-notes{font-size:11px;color:var(--ink3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.b-date-col{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;min-width:76px;}
.b-date{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;white-space:nowrap;text-align:right;}
.b-recur{font-size:10px;color:var(--orange);font-family:'DM Mono',monospace;white-space:nowrap;text-align:right;}
.b-amt{font-family:'DM Mono',monospace;font-size:12px;color:var(--orange);flex-shrink:0;font-weight:500;min-width:28px;text-align:right;}
.status-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-family:'DM Mono',monospace;padding:4px 8px;border-radius:20px;cursor:pointer;border:none;white-space:nowrap;flex-shrink:0;transition:opacity .15s;min-width:68px;justify-content:center;font-weight:500;}
.status-badge:active{opacity:.7;}
.s-done{background:var(--done-bg);color:var(--done-color);}.s-todo{background:var(--todo-bg);color:var(--todo-color);}.s-waiting{background:var(--waiting-bg);color:var(--waiting-color);}.s-tooearly{background:var(--early-bg);color:var(--early-color);}
.row-edit-btn{background:none;border:none;color:var(--ink3);font-size:18px;padding:4px;cursor:pointer;flex-shrink:0;line-height:1;}
.row-edit-btn:active{color:var(--orange);}
.status-picker{position:fixed;z-index:150;background:var(--paper);border:1px solid var(--border);border-radius:14px;box-shadow:0 8px 32px rgba(44,36,22,.2);padding:6px;min-width:130px;display:none;}
.status-picker.open{display:block;}
.sp-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;}
.sp-item:active{background:var(--paper2);}
.sp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sp-done{background:var(--done-color);} .sp-todo{background:var(--todo-color);} .sp-waiting{background:var(--waiting-color);} .sp-early{background:var(--early-color);}
.add-row-btn{display:flex;align-items:center;gap:6px;width:100%;padding:11px 16px;background:none;border:none;border-top:1px dashed var(--border);color:var(--ink3);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.add-row-btn:active{color:var(--orange);}
.fab{position:fixed;bottom:calc(20px + var(--safe-bottom));right:18px;width:54px;height:54px;border-radius:50%;background:var(--orange);color:white;font-size:26px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(217,112,38,.4);z-index:50;transition:transform .15s;}
.fab:active{transform:scale(.93);}
.sheet-overlay{position:fixed;inset:0;background:rgba(44,36,22,.5);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.sheet-overlay.open{opacity:1;pointer-events:all;}
.sheet{background:var(--paper);border-radius:22px 22px 0 0;padding:0 18px calc(20px + var(--safe-bottom));width:100%;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s ease;border-top:1px solid var(--border);}
.sheet-overlay.open .sheet{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 16px;}
.sheet-title{font-family:'Crimson Pro',serif;font-size:20px;font-weight:600;color:var(--ink);margin-bottom:18px;padding:0 2px;}
.form-group{margin-bottom:14px;}
.form-group label{font-size:11px;font-family:'DM Mono',monospace;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--paper2);border:1px solid var(--border);border-radius:10px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:15px;padding:11px 14px;outline:none;-webkit-appearance:none;transition:border-color .15s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--orange);background:var(--paper);}
.form-group textarea{resize:none;height:68px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.recur-hint{font-size:11px;color:var(--ink3);margin-top:-8px;margin-bottom:12px;line-height:1.5;padding:0 2px;}
.sheet-actions{display:flex;gap:8px;margin-top:8px;}
.btn{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;padding:13px;border-radius:12px;border:none;cursor:pointer;flex:1;transition:opacity .15s;}
.btn:active{opacity:.8;}
.btn-primary{background:var(--orange);color:white;}
.btn-ghost{background:var(--paper2);color:var(--ink);border:1px solid var(--border);}
.btn-danger{background:#FEF0F0;color:#C0392B;border:1px solid #F5C6C6;}
.card-mgmt{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);display:none;}
.card-mgmt-label{font-size:11px;color:var(--ink3);margin-bottom:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.07em;}
.loading{text-align:center;padding:60px 20px;color:var(--ink3);font-size:14px;}
.spinner{display:inline-block;width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .9s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-state{text-align:center;padding:40px;color:var(--ink3);font-size:13px;}
.config-screen{position:fixed;inset:0;background:var(--paper);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.config-screen.hidden{display:none;}
.config-logo{font-family:'Crimson Pro',serif;font-size:28px;font-weight:600;color:var(--orange);margin-bottom:8px;}
.config-logo span{color:var(--ink2);font-weight:400;font-style:italic;}
.config-title{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:8px;text-align:center;}
.config-sub{font-size:13px;color:var(--ink2);margin-bottom:28px;text-align:center;line-height:1.6;max-width:340px;}
.config-input-wrap{width:100%;max-width:420px;margin-bottom:14px;}
.config-input-wrap label{font-size:11px;font-family:'DM Mono',monospace;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:6px;}
.config-input-wrap input{width:100%;background:var(--paper2);border:1px solid var(--border);border-radius:10px;color:var(--ink);font-family:'DM Mono',monospace;font-size:12px;padding:12px 14px;outline:none;}
.config-input-wrap input:focus{border-color:var(--orange);}
.config-btn{width:100%;max-width:420px;background:var(--orange);color:white;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;padding:14px;border-radius:12px;border:none;cursor:pointer;}
.config-note{font-size:11px;color:var(--ink3);margin-top:18px;text-align:center;line-height:1.7;max-width:340px;}
.config-note code{font-family:'DM Mono',monospace;color:var(--ink2);background:var(--paper3);padding:2px 6px;border-radius:4px;font-size:10px;}
</style>
</head>
<body>

<div class="config-screen" id="configScreen">
  <div class="config-logo">Benefits <span>Tracker</span></div>
  <div class="config-title">Connect to Google Sheets</div>
  <div class="config-sub">Paste your Google Apps Script Web App URL to sync data across all your devices.</div>
  <div class="config-input-wrap">
    <label>Apps Script Web App URL</label>
    <input type="url" id="configUrl" placeholder="https://script.google.com/macros/s/..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <button class="config-btn" onclick="saveConfig()">Connect &amp; Load Data</button>
  <div class="config-note">Your URL looks like:<br><code>https://script.google.com/macros/s/AKfy.../exec</code></div>
</div>

<header>
  <div class="logo">Benefits <span>Tracker</span></div>
  <div class="hdr-right">
    <div class="sync-dot" id="syncDot"></div>
    <span class="sync-label" id="syncLabel"></span>
    <button style="background:none;border:none;color:var(--ink3);font-size:20px;cursor:pointer;padding:2px 4px;line-height:1;" onclick="showConfig()">⚙</button>
  </div>
</header>

<div class="summary-bar" id="summaryBar"></div>

<div class="filter-bar">
  <div class="filter-section">
    <button class="fbtn active" data-f="all" onclick="setFilter('all',this)">All</button>
    <button class="fbtn" data-f="Todo" onclick="setFilter('Todo',this)">Todo</button>
    <button class="fbtn" data-f="Done" onclick="setFilter('Done',this)">Done</button>
    <button class="fbtn" data-f="Waiting" onclick="setFilter('Waiting',this)">Waiting</button>
    <button class="fbtn" data-f="Too early" onclick="setFilter('Too early',this)">Too Early</button>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-section">
    <button class="fbtn active" data-o="all" onclick="setOwner('all',this)">All</button>
    <button class="fbtn" data-o="Justin" onclick="setOwner('Justin',this)">Justin</button>
    <button class="fbtn" data-o="EJ" onclick="setOwner('EJ',this)">EJ</button>
  </div>
</div>

<div class="scroll-area" id="scrollArea">
  <div class="loading" id="loadingMsg"><div class="spinner"></div><br>Loading your benefits...</div>
</div>

<button class="fab" onclick="openAdd(null)">＋</button>

<div class="status-picker" id="statusPicker">
  <div class="sp-item" onclick="pickStatus('Todo')"><span class="sp-dot sp-todo"></span>Todo</div>
  <div class="sp-item" onclick="pickStatus('Done')"><span class="sp-dot sp-done"></span>Done</div>
  <div class="sp-item" onclick="pickStatus('Waiting')"><span class="sp-dot sp-waiting"></span>Waiting</div>
  <div class="sp-item" onclick="pickStatus('Too early')"><span class="sp-dot sp-early"></span>Too early</div>
</div>

<div class="sheet-overlay" id="sheetOverlay" onclick="handleOverlayClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">Add Benefit</div>
    <div class="form-group" id="cardSelectGroup">
      <label>Card</label>
      <select id="fCard"></select>
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" id="fDesc" placeholder="e.g. Hotel Credit">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Due Date</label>
        <input type="text" id="fDate" placeholder="YYYY.MM.DD">
      </div>
      <div class="form-group">
        <label>Amount</label>
        <input type="text" id="fAmt" placeholder="$50">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select id="fStatus">
          <option>Todo</option>
          <option>Done</option>
          <option>Waiting</option>
          <option>Too early</option>
        </select>
      </div>
      <div class="form-group">
        <label>Recurring</label>
        <select id="fRecurring" onchange="updateRecurHint()">
          <option value="none">None</option>
          <option value="monthly">Monthly</option>
          <option value="annual">Annual</option>
        </select>
      </div>
    </div>
    <div class="recur-hint" id="recurHint"></div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="fNotes" placeholder="Optional notes..."></textarea>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" onclick="closeSheet()">Cancel</button>
      <button class="btn btn-danger" id="deleteBtn" style="display:none" onclick="doDelete()">Delete</button>
      <button class="btn btn-primary" onclick="saveEntry()">Save</button>
    </div>
    <div class="card-mgmt" id="cardMgmt">
      <div class="card-mgmt-label">Card Actions</div>
      <button class="btn btn-danger" style="width:100%" onclick="doDeleteCard()">Delete Entire Card</button>
    </div>
  </div>
</div>

<script>
var API_URL_KEY='benefit_tracker_api_url';
var apiUrl=localStorage.getItem(API_URL_KEY)||'';
var appData={cards:[]};
var nextId=1000;
var activeFilter='all';
var ownerFilter='all';
var openCards={};
var editState=null;
var saveTimer=null;

function saveConfig(){
  var url=document.getElementById('configUrl').value.trim();
  if(!url){alert('Please enter your Apps Script URL');return;}
  apiUrl=url;localStorage.setItem(API_URL_KEY,url);
  document.getElementById('configScreen').classList.add('hidden');
  loadData();
}
function showConfig(){
  document.getElementById('configUrl').value=apiUrl;
  document.getElementById('configScreen').classList.remove('hidden');
}
window.addEventListener('DOMContentLoaded',function(){
  if(!apiUrl)document.getElementById('configScreen').classList.remove('hidden');
  else{document.getElementById('configScreen').classList.add('hidden');loadData();}
});

function setSyncStatus(state,msg){
  document.getElementById('syncDot').className='sync-dot '+state;
  document.getElementById('syncLabel').textContent=msg;
}
function loadData(){
  setSyncStatus('saving','Loading...');
  fetch(apiUrl+'?action=getData')
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.error)throw new Error(d.error);
      appData=d;
      applyAutoStatus();
      setSyncStatus('saved','Synced');
      document.getElementById('loadingMsg').style.display='none';
      render();
    })
    .catch(function(err){
      setSyncStatus('error','Error');
      document.getElementById('loadingMsg').innerHTML='<div style="color:#C0392B;font-size:13px">Could not load data.<br><small>'+err.message+'</small></div>';
    });
}
function scheduleSave(){
  setSyncStatus('saving','Saving...');
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(pushData,800);
}
function pushData(){
  fetch(apiUrl,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'saveData',data:appData})})
    .then(function(r){return r.json();})
    .then(function(d){if(d.error)throw new Error(d.error);setSyncStatus('saved','Saved');})
    .catch(function(){setSyncStatus('error','Save failed');});
}

// ── Date helpers ──────────────────────────────────────────────
function parseDate(s){
  if(!s)return null;
  var p=s.split('.');
  if(p.length>=3)return new Date(Date.UTC(+p[0],+p[1]-1,+p[2],12));
  if(p.length===2)return new Date(Date.UTC(+p[0],+p[1]-1,1,12));
  return null;
}
function formatDate(d){
  return d.getUTCFullYear()+'.'+String(d.getUTCMonth()+1).padStart(2,'0')+'.'+String(d.getUTCDate()).padStart(2,'0');
}
function todayUTC(){var n=new Date();return new Date(Date.UTC(n.getFullYear(),n.getMonth(),n.getDate(),12));}
function advanceMonthly(s){
  var d=parseDate(s);if(!d)return s;
  return formatDate(new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth()+1,d.getUTCDate(),12)));
}
function advanceAnnual(s){
  var d=parseDate(s);if(!d)return s;
  return formatDate(new Date(Date.UTC(d.getUTCFullYear()+1,d.getUTCMonth(),d.getUTCDate(),12)));
}
function computeAutoStatus(b){
  if(b.status==='Waiting')return b.status;
  if(!b.recurring||b.recurring==='none')return b.status;
  var d=parseDate(b.date);if(!d)return b.status;
  var today=todayUTC();
  if(b.recurring==='monthly'){
    var threshold=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),1,12));
    return today>=threshold?'Todo':'Too early';
  }
  if(b.recurring==='annual')return today>=d?'Todo':'Too early';
  return b.status;
}
function applyAutoStatus(){
  var changed=false;
  appData.cards.forEach(function(c){
    c.benefits.forEach(function(b){
      if(b.status==='Done'||b.status==='Waiting')return; // don't auto-change manually set Done/Waiting
      var ns=computeAutoStatus(b);
      if(ns!==b.status){b.status=ns;changed=true;}
    });
  });
  if(changed)scheduleSave();
}

// ── Helpers ───────────────────────────────────────────────────
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function scls(s){if(s==='Done')return 's-done';if(s==='Todo')return 's-todo';if(s==='Waiting')return 's-waiting';return 's-tooearly';}
function sicon(s){if(s==='Done')return'✓';if(s==='Todo')return'○';if(s==='Waiting')return'◑';return'–';}
function recurLabel(r){if(r==='monthly')return'↻ mo';if(r==='annual')return'↻ yr';return'';}

// ── Status picker ─────────────────────────────────────────────
var pickerTarget=null;
function tapStatus(cardId,bid,el){
  var picker=document.getElementById('statusPicker');
  // Toggle off if same badge tapped again
  if(pickerTarget&&pickerTarget.cardId===cardId&&pickerTarget.bid===bid){
    picker.classList.remove('open');
    pickerTarget=null;
    return;
  }
  pickerTarget={cardId:cardId,bid:bid};
  var rect=el.getBoundingClientRect();
  var top=rect.bottom+6;
  var left=rect.left;
  if(left+140>window.innerWidth)left=window.innerWidth-146;
  if(top+170>window.innerHeight)top=rect.top-176;
  picker.style.top=top+'px';
  picker.style.left=left+'px';
  picker.classList.add('open');
}
// Use mousedown on document to close when clicking outside
document.addEventListener('mousedown',function(e){
  var picker=document.getElementById('statusPicker');
  if(picker.classList.contains('open')&&!picker.contains(e.target)){
    picker.classList.remove('open');
    pickerTarget=null;
  }
});
// Use touchstart for mobile
document.addEventListener('touchstart',function(e){
  var picker=document.getElementById('statusPicker');
  if(picker.classList.contains('open')&&!picker.contains(e.target)){
    picker.classList.remove('open');
    pickerTarget=null;
  }
},{passive:true});

function pickStatus(newStatus){
  if(!pickerTarget)return;
  var card=appData.cards.find(function(c){return c.id===pickerTarget.cardId;});
  var b=card.benefits.find(function(x){return x.id===pickerTarget.bid;});
  var oldStatus=b.status;
  b.status=newStatus;
  document.getElementById('statusPicker').classList.remove('open');
  pickerTarget=null;
  if(newStatus==='Done'&&oldStatus!=='Done'&&(b.recurring==='monthly'||b.recurring==='annual')){
    render();scheduleSave();
    setTimeout(function(){
      if(confirm('Advance to next cycle?')){
        b.date=b.recurring==='monthly'?advanceMonthly(b.date):advanceAnnual(b.date);
        b.status=computeAutoStatus(b);
        render();scheduleSave();
      }
    },150);
    return;
  }
  render();scheduleSave();
}

function calcSummary(){
  var done=0,todo=0,waiting=0,dAmt=0,tAmt=0;
  appData.cards.forEach(function(c){
    c.benefits.forEach(function(b){
      var a=parseFloat((b.amt||'').replace(/[^0-9.]/g,''))||0;
      if(b.status==='Done'){done++;dAmt+=a;}
      else if(b.status==='Todo'){todo++;tAmt+=a;}
      else if(b.status==='Waiting')waiting++;
    });
  });
  return{done:done,todo:todo,waiting:waiting,dAmt:dAmt,tAmt:tAmt};
}

function setFilter(f,el){activeFilter=f;document.querySelectorAll('.fbtn[data-f]').forEach(function(b){b.classList.remove('active');});el.classList.add('active');render();}
function setOwner(f,el){ownerFilter=f;document.querySelectorAll('.fbtn[data-o]').forEach(function(b){b.classList.remove('active');});el.classList.add('active');render();}

function render(){
  var s=calcSummary();
  document.getElementById('summaryBar').innerHTML=
    '<div class="summary-item"><div class="summary-val v-orange">$'+s.dAmt.toFixed(0)+'</div><div class="summary-label">Captured</div></div>'+
    '<div class="summary-item"><div class="summary-val v-done">'+s.done+'</div><div class="summary-label">Done</div></div>'+
    '<div class="summary-item"><div class="summary-val v-todo">$'+s.tAmt.toFixed(0)+'</div><div class="summary-label">Pending</div></div>'+
    '<div class="summary-item"><div class="summary-val v-todo">'+s.todo+'</div><div class="summary-label">Todo</div></div>'+
    '<div class="summary-item"><div class="summary-val v-waiting">'+s.waiting+'</div><div class="summary-label">Waiting</div></div>';

  var area=document.getElementById('scrollArea');
  area.innerHTML='';
  var visible=appData.cards.filter(function(c){
    if(ownerFilter!=='all'&&c.owner!==ownerFilter)return false;
    if(activeFilter==='all')return true;
    return c.benefits.some(function(b){return b.status===activeFilter;});
  });
  if(!visible.length){area.innerHTML='<div class="empty-state">No cards match the current filter.</div>';return;}

  visible.forEach(function(card){
    var isOpen=openCards[card.id]!==false;
    var vb=card.benefits.filter(function(b){return activeFilter==='all'||b.status===activeFilter;});
    var dC=card.benefits.filter(function(b){return b.status==='Done';}).length;
    var tC=card.benefits.filter(function(b){return b.status==='Todo';}).length;
    var wC=card.benefits.filter(function(b){return b.status==='Waiting';}).length;

    var rows=vb.map(function(b){
      var rl=recurLabel(b.recurring);
      return '<div class="benefit-row">'+
        '<div class="b-main">'+
          '<div class="b-desc">'+esc(b.desc)+'</div>'+
          (b.notes?'<div class="b-notes">'+esc(b.notes)+'</div>':'')+
        '</div>'+
        '<div class="b-date-col">'+
          (b.date?'<div class="b-date">'+esc(b.date)+'</div>':'')+
          (rl?'<div class="b-recur">'+rl+'</div>':'')+
        '</div>'+
        (b.amt?'<div class="b-amt">'+esc(b.amt)+'</div>':'')+
        '<button class="status-badge '+scls(b.status)+'" onclick="tapStatus(\''+card.id+'\','+b.id+',this)">'+sicon(b.status)+' '+b.status+'</button>'+
        '<button class="row-edit-btn" onclick="openEdit(\''+card.id+'\','+b.id+')">›</button>'+
      '</div>';
    }).join('');
    if(!rows)rows='<div style="padding:14px 16px;font-size:13px;color:var(--ink3)">No benefits match filter</div>';

    var pills='';
    if(dC)pills+='<span class="spill pd">✓ '+dC+'</span>';
    if(tC)pills+='<span class="spill pt">○ '+tC+'</span>';
    if(wC)pills+='<span class="spill pw">◑ '+wC+'</span>';

    var div=document.createElement('div');
    div.className='card-group';
    div.innerHTML=
      '<div class="card-header" onclick="toggleCard(\''+card.id+'\')">'+
        '<div>'+
          '<div class="card-name">'+esc(card.name)+'</div>'+
          '<div class="card-meta">'+esc(card.owner)+(card.last4?' · ···'+card.last4:'')+' · '+esc(card.fee)+'</div>'+
        '</div>'+
        '<div class="card-right">'+
          '<div class="stat-pills">'+pills+'</div>'+
          '<button class="row-edit-btn" style="font-size:20px;color:var(--ink3)" onclick="event.stopPropagation();openCardEdit(\''+card.id+'\')">⋯</button>'+
          '<span class="chevron'+(isOpen?' open':'')+'">▶</span>'+
        '</div>'+
      '</div>'+
      '<div class="card-body'+(isOpen?' open':'')+'" id="body-'+card.id+'">'+
        rows+
        '<button class="add-row-btn" onclick="openAdd(\''+card.id+'\')">＋ Add benefit to this card</button>'+
      '</div>';
    area.appendChild(div);
  });

  var addCard=document.createElement('div');
  addCard.innerHTML='<button onclick="addCardGroup()" style="width:100%;padding:14px;background:var(--paper);border:1px dashed var(--border);border-radius:14px;color:var(--ink3);font-size:13px;cursor:pointer;font-family:\'DM Sans\',sans-serif;margin-bottom:10px;">＋ Add New Card</button>';
  area.appendChild(addCard);
}

function toggleCard(id){
  openCards[id]=openCards[id]===false?true:false;
  var body=document.getElementById('body-'+id);
  var chevron=body?body.previousElementSibling.querySelector('.chevron'):null;
  if(body){
    if(openCards[id]===false){body.classList.remove('open');if(chevron)chevron.classList.remove('open');}
    else{body.classList.add('open');if(chevron)chevron.classList.add('open');}
  }
}

function updateRecurHint(){
  var r=document.getElementById('fRecurring').value;
  var h=document.getElementById('recurHint');
  if(r==='monthly')h.textContent='Auto-advances monthly. Status sets to Todo on the 1st of the due month.';
  else if(r==='annual')h.textContent='Auto-advances yearly. Status sets to Todo on or after the due date.';
  else h.textContent='';
}
function populateCardSelect(selectedId){
  document.getElementById('fCard').innerHTML=appData.cards.map(function(c){
    return '<option value="'+c.id+'"'+(c.id===selectedId?' selected':'')+'>'+c.name+' ('+c.owner+(c.last4?' ···'+c.last4:'')+')' +'</option>';
  }).join('');
}
function openAdd(cardId){
  editState={cardId:cardId||(appData.cards[0]&&appData.cards[0].id),benefitId:null};
  document.getElementById('sheetTitle').textContent='Add Benefit';
  document.getElementById('deleteBtn').style.display='none';
  document.getElementById('cardMgmt').style.display='none';
  document.getElementById('cardSelectGroup').style.display='block';
  populateCardSelect(editState.cardId);
  document.getElementById('fDesc').value='';
  document.getElementById('fDate').value='';
  document.getElementById('fAmt').value='';
  document.getElementById('fStatus').value='Todo';
  document.getElementById('fRecurring').value='none';
  document.getElementById('fNotes').value='';
  document.getElementById('recurHint').textContent='';
  openSheet();
}
function openEdit(cardId,bid){
  var card=appData.cards.find(function(c){return c.id===cardId;});
  var b=card.benefits.find(function(x){return x.id===bid;});
  editState={cardId:cardId,benefitId:bid};
  document.getElementById('sheetTitle').textContent='Edit Benefit';
  document.getElementById('deleteBtn').style.display='flex';
  document.getElementById('cardMgmt').style.display='none';
  document.getElementById('cardSelectGroup').style.display='block';
  populateCardSelect(cardId);
  document.getElementById('fDesc').value=b.desc;
  document.getElementById('fDate').value=b.date||'';
  document.getElementById('fAmt').value=b.amt||'';
  document.getElementById('fStatus').value=b.status;
  document.getElementById('fRecurring').value=b.recurring||'none';
  document.getElementById('fNotes').value=b.notes||'';
  updateRecurHint();
  openSheet();
}
function openCardEdit(cardId){
  var card=appData.cards.find(function(c){return c.id===cardId;});
  editState={cardId:cardId,benefitId:null,cardOnly:true};
  document.getElementById('sheetTitle').textContent='Edit Card';
  document.getElementById('deleteBtn').style.display='none';
  document.getElementById('cardMgmt').style.display='block';
  document.getElementById('cardSelectGroup').style.display='none';
  document.getElementById('fDesc').value=card.name;
  document.getElementById('fDate').value=card.last4||'';
  document.getElementById('fAmt').value=card.fee||'';
  document.getElementById('fStatus').value='Todo';
  document.getElementById('fRecurring').value='none';
  document.getElementById('fNotes').value='';
  document.getElementById('recurHint').textContent='';
  openSheet();
}
function saveEntry(){
  if(editState&&editState.cardOnly){
    var card=appData.cards.find(function(c){return c.id===editState.cardId;});
    card.name=document.getElementById('fDesc').value;
    card.last4=document.getElementById('fDate').value;
    card.fee=document.getElementById('fAmt').value;
    closeSheet();render();scheduleSave();return;
  }
  var cardId=document.getElementById('fCard').value;
  var card=appData.cards.find(function(c){return c.id===cardId;});
  var entry={
    id:editState.benefitId||nextId++,
    desc:document.getElementById('fDesc').value,
    date:document.getElementById('fDate').value,
    amt:document.getElementById('fAmt').value,
    status:document.getElementById('fStatus').value,
    recurring:document.getElementById('fRecurring').value,
    notes:document.getElementById('fNotes').value,
  };
  entry.status=computeAutoStatus(entry);
  if(editState.benefitId){
    appData.cards.forEach(function(c){c.benefits=c.benefits.filter(function(b){return b.id!==editState.benefitId;});});
    card.benefits.push(entry);
  }else{card.benefits.push(entry);}
  closeSheet();render();scheduleSave();
}
function doDelete(){
  if(!confirm('Delete this benefit?'))return;
  appData.cards.forEach(function(c){c.benefits=c.benefits.filter(function(b){return b.id!==editState.benefitId;});});
  closeSheet();render();scheduleSave();
}
function doDeleteCard(){
  if(!confirm('Delete this entire card and all its benefits?'))return;
  appData.cards=appData.cards.filter(function(c){return c.id!==editState.cardId;});
  closeSheet();render();scheduleSave();
}
function addCardGroup(){
  var name=prompt('Card name:');if(!name)return;
  var owner=prompt('Owner (Justin or EJ):')||'Justin';
  var last4=prompt('Last 4 digits (optional):')||'';
  var fee=prompt('Annual fee (e.g. $95):')||'';
  appData.cards.push({id:'card-'+nextId++,name:name,owner:owner,last4:last4,fee:fee,benefits:[]});
  render();scheduleSave();
}
function openSheet(){document.getElementById('sheetOverlay').classList.add('open');setTimeout(function(){document.getElementById('fDesc').focus();},300);}
function closeSheet(){document.getElementById('sheetOverlay').classList.remove('open');editState=null;}
function handleOverlayClick(e){if(e.target===document.getElementById('sheetOverlay'))closeSheet();}
</script>
